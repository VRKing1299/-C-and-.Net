<html lang="en">
<head>
   <script src="jquery-3.6.0.js"></script>

<body>

        <p>p1</p>
        <p>p2</p>
        <p>p3</p>

    </div>

    $("#div1").html("<p>New Para</p>");

</body>
</html>
