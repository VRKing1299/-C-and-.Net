<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/Navigation.css">
    <link rel="stylesheet" href="./css/productmanager.css">
</head>
<body>
    <header></header>

    <main>
        <div class="container">
            <form action="" id="signUpform">
                <h1>Product Manager</h1>
                <div class="input-container">
                    <label for="ddlProdId">Prouct Id : </label>
                    <select name="ddlProdId" id="ddlProdId">
                    </select>
                </div>
                <div class="input-container">
                    <label for="ddlCategory">Category : </label>
                    <select name="ddlCategory" id="ddlCategory">
                    </select>
                </div>
                <div class="input-container">
                    <label for="txtProductName">Product Name : </label>
                    <input type="text" name="txtProductName" id="txtProductName" required>
                </div>
                <div class="input-container">
                    <label for="txtPrice">Price : </label>
                    <input type="number" name="txtPrice" id="txtPrice" required>
                </div>
                <div class="input-container">
                    <label for="txtImageUrl">Image Url : </label>
                     <input type="file" id="fileImage" accept="image/*">
                </div>
                <div class="input-container">
                    <label for="txtStockQuantity">Stock Quantity : </label>
                    <input type="number" name="txtStockQuantity" id="txtStockQuantity" min="0" required>
                </div>
                <div class="button-container">
                    <button id="btnAdd" type="button">Add</button>
                    <button id="btnAddProduct" type="button">Add Product</button>
                </div>
                <div class="button-container">
                    <button id="btnEdit" type="button">Edit</button>
                    <button id="btnUpdate" type="button" disabled>Update Product</button>
                </div>
                <div class="button-container">
                    <button id="btnDelete" type="button">Delete</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <div class="footer-container">
            <p>Made by VR</p>
            <p>Thank you for Visiting</p>
        </div>
    </footer>


    <script src="./js/jquery-4.0.0.js"></script>
    <script src="./js/common.js"></script>
    <script src="./js/ProductManager.js"></script>
</body>
</html>
