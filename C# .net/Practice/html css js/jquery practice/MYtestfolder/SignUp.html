<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp</title>
    <link rel="stylesheet" href="./css/login.css">
</head>
<body>

    <div class="container">
        <h2>SignUp</h2>

        <form id="signUpForm">
            <label for="userName">User Name</label>
            <input type="text" id="userName" name="userName" placeholder="User Name" required><br><br>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="email" required><br><br>
            <label for="phoneNo">Phone Number</label>
            <input type="tel" id="phoneNo" name="phoneNo" placeholder="phoneNo" minlength="10" maxlength="10" required><br><br>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="password" required><br><br>
            <button type="submit" class="btn" id="btnSignUp">SignUp</button>
        </form>
        <p>Already have an account <a href="LogIn.html">LogIn</a></p>
    </div>

    <script src="./js/jquery-4.0.0.js"></script>
    <script src="./js/common.js"></script>
    <script src="./js/SignUp.js"></script>
    <!-- <script src="./js/login.js"></script> -->
</body>
</html>
