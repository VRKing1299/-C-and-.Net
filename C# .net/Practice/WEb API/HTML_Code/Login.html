<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page - Costmetics Store</title>
    <link rel="stylesheet" href="./Login.css" />
    <link rel="icon" href="./Images/CosmeticsIcon.jpg" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Jersey+10&display=swap" rel="stylesheet">
    <style>
        /* Inline styles for gradient overlay */
        .gradient-form {
            position: relative;
            height: 100vh;
            background-image: url('./Images/CosmeticsImgLogin.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }
        .gradient-form::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)); /* Dark gradient overlay */
            z-index: 1;
        }
        .gradient-form .container {
            position: relative;
            z-index: 2;
        }
        .btn-primary {
            background-color: #e91e63; /* Customize button color */
            border: none;
        }
        .cover-header {
            font-family: 'Bebas Neue', cursive;
            font-size: 2rem;
        }
        .text-muted {
            color: #6c757d !important; /* Bootstrap text-muted color */
        }
        .form-control{
            width: 80%;
         
        }
       
    </style>
</head>
<body>
    <section class="h-100 gradient-form">
        <div class="container py-5 h-100">
            <div class="row d-flex justify-content-center align-items-center h-100">
                <div class="col-xl-10">
                    <div class="card rounded-3 text-black">
                        <div class="row g-0">
                            <div class="col-lg-6">
                                <div class="card-body mx-md-2">
                                    <div class="text-center">
                                        <img src="./Images/CosmeticsLogo.jpg" style="width: 185px;" alt="Glamour Bags Logo">
                                        <h4 class="mt-1 mb-2 pb-1">Welcome to Cosmetic Store</h4>
                                    </div>
                                    <form id="loginForm">
                                        <p>Please log in to access our exclusive collection of Cosmetics.</p>
                                        <div class="form-outline mb-2">
                                            <label class="form-label" for="UserName">userName</label>
                                            <input type="email" id="UserName" class="form-control" placeholder="Email address" />
                                            
                                        </div>
                                        <div class="form-outline mb-4">
                                            <label class="form-label" for="UserPassword"> Password</label>
                                            <input type="Password" id="UserPassword" class="form-control" placeholder="Password" />
                                            
                                        </div>
                                        <div class="text-center pt-1 mb-2 pb-1">
                                            <button type="button" class="btn btn-primary btn-block fa-lg mb-2" onclick="ChkLogin()">Log in</button>
                                        </div>
                                        <div class="d-flex align-items-center justify-content-center pb-4">
                                            <p class="mb-0 me-2">Don't have an account?</p>
                                            <button type="button" class="btn btn-primary"><a href="./Registration.html" class="btn-link">Create new</a></button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                            <div class="col-lg-6 d-flex align-items-center gradient-custom-2">
                               
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script src="Login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
