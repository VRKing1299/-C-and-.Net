<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
    <style>
        .gradient-form{
            background-image: url(./Images/CosmeticsImgLogin.jpg);
            background-repeat: no-repeat;
            background-size: cover;
            
        }

        .gradient-form .container {
            height: 100vh;
        }

        .card-body{
            padding: 0 1rem !important;
        }
        
    </style>
    <link rel="icon" href="./Images/CosmeticsIcon.jpg" type="image/x-icon">
    <link rel="stylesheet" href="./Login.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Jersey+10&display=swap" rel="stylesheet">    
    <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>

</head>
<body>
    <section class="h-100 gradient-form" style="background-color: #eee;">
        <div class="container">
            <div class="row d-flex justify-content-center align-items-center h-100">
                <div class="col-xl-10">
                    <div class="card rounded-3 text-black">
                        <div class="row g-0">
                            <div class="col-lg-6">
                                <div class="card-body  mx-md-4">
                                    <div class="text-center">
                                        <img src="./Images/CosmeticsLogo.jpg" style="width: 185px;" alt="logo">
                                        <h4 class="mt-1 mb-5 pb-1">Welcome to the Cosmetic store </h4>
                                    </div>
                                    <form id="registerForm">
                                        <p>Create your account</p>
                                        <div data-mdb-input-init class="form-outline">
                                            <input type="text" id="fullName" class="form-control" placeholder="Full Name" />
                                            <label class="form-label" for="fullName"></label>
                                        </div>
                                        <div data-mdb-input-init class="form-outline">
                                            <input type="email" id="emailAddress" class="form-control" placeholder="Email Address" />
                                            <label class="form-label" for="emailAddress"></label>
                                        </div>
                                        <div data-mdb-input-init class="form-outline">
                                            <input type="password" id="password" class="form-control" placeholder="Password" />
                                            <label class="form-label" for="password"></label>
                                        </div>
                                        <div data-mdb-input-init class="form-outline">
                                            <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm Password" />
                                            <label class="form-label" for="confirmPassword"></label>
                                        </div>
                                        <div class="text-center pt-1 mb-2 pb-1">
                                            <button id="btnReg" data-mdb-button-init data-mdb-ripple-init  type="button" onclick="register()">Register</button>
                                        </div>
                                        <div class="d-flex align-items-center justify-content-center pb-4">
                                            <p class="mb-0 me-2">Already have an account?</p>
                                            <button type="button" data-mdb-button-init data-mdb-ripple-init class="btn btn-primary"> <a href="./Login.html" class="btn-link">Login</a></button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                            <div class="col-lg-6 d-flex align-items-center gradient-custom-2">
                               
                                
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script src="Login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
