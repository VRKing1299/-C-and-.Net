<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .Navigation{        
        }
        #NavigationList{
            background-color: black;
            color: white;
            height: 50px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            list-style: none;
        }
        #NavigationList>li{
            display: flex;
            justify-content: center;
            padding: 10px;
            margin: 5px;
            width: 100%;
            border-radius: 5px;
            transition: all 0.5s;
        }

        #NavigationList>li:hover{
            background-color: white;
            color: black;
            transform: scale(1.2);
        }

        .active {
            
        }
    </style>
</head>
<body>
    <nav class="Navigation">
        <ul id="NavigationList">
            <li class="active">Home</li>
            <li>Shop</li>
            <li>About</li>
            <li>Contact Us</li>
        </ul>
    </nav>
</body>
</html>
