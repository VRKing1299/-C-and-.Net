    <style>
        .states{
            display: inline-block;
            background-color: white;
            width: 200px;
            height: 40px;
            margin: 10px 5% ;
            text-align: center;
            border-radius: 5px;
            box-shadow: 1px 1px 5px grey;
            border-left: 10px solid royalblue ;
            position: relative;
            overflow: hidden;
            transition: all 1s ;
        }
        .filling{
            display: inline-block;
            width: 0px;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            transition: all 1s ease;
            background: royalblue;
        }
        .states:hover > .filling{
            width: 100%;
        }
