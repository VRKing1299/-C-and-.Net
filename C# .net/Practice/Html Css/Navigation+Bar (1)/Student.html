<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
    table
    {
        border: 2px solid #afacac;
        border-collapse: collapse;

    }
    table tr td
    {
        border: 2px solid #afacac;
        border-collapse: collapse;
    }
    .heading
    {
        font-weight: bold;
    }
    #Marks
    {
        text-align: center;
    }
    </style>
</head>
<body>
    <table>
        <caption>Student Data</caption>
        <tr>
            <td class="heading" rowspan="2">Name</td>
            <td class="heading" id="Marks" colspan="3">Marks</td>
        </tr>
            <tr>
                <td>Math</td>
                <td>Science</td>
                <td>English</td>
            </tr>
            <tr>
                <td>Alina</td>
                <td>78</td>
                <td>78</td>
                <td>78</td>
            </tr>
          
    </table>
</body>
</html>
