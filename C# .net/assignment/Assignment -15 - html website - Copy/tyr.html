<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToyLand | Premium Toys for Kids</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* FOOTER */
footer {
    background-color: #222;
    color: white;
    margin-top: 50px;
}

/* CONTAINER */
.footer-container {
    display: flex;
    justify-content: space-around;
    flex-wrap: wrap;
    padding: 40px 20px;
    gap: 20px;
}

/* SECTION */
.footer-section {
    max-width: 250px;
}

/* LOGO */
.footer-logo {
    font-size: 22px;
    margin-bottom: 10px;
}

/* HEADINGS */
.footer-section h3 {
    margin-bottom: 10px;
}

/* LIST */
.footer-section ul {
    list-style: none;
    text-align: center;
    padding: 0;
}

.footer-section ul li {
    margin: 6px 0;
}

/* LINKS */
.footer-section ul li a {
    text-decoration: none;
    color: #ccc;
    transition: 0.3s;
}

.footer-section ul li a:hover {
    color: #ffd91c;
}

/* SOCIAL ICONS */
.social-icons i {
    font-size: 20px;
    margin-right: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.social-icons i:hover {
    color: #ffd91c;
}

/* BOTTOM */
.footer-bottom {
    text-align: center;
    padding: 15px;
    background-color: #111;
    font-size: 14px;
}
    </style>
</head>
<body>
    
</body>
</html>
