<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Fast</title>
    <style>
        .input{
            padding-top: 1.5%;
            padding-left: 6%; 
            font-size: 100%;
            outline: none;
        }
        button {
           background-color: #007bff;
           color: #fff;
           padding: 10px 20px;
           border: none;
           border-radius: 25px; 
          cursor: pointer;
          }
    </style>
  
</head>
<body>

    <!-- ---------------------------------------------------------------------------------------- -->
    <main >
    <div style="margin-top: 1.5%;">
    <h1 style="font-family: 'Courier New', Courier, monospace;color: rgb(255, 136, 0); font-size: 300%;margin: 0%;">Login</h1>
    <a href="Signuppage.html" style="display: block; margin: 0; text-decoration: none; color: rgb(250, 115, 4);">create a new account</a> 
    </div>
    <div style="margin-top: 1.5%;">
     <label style=" font-size: 150%; color: rgb(0, 0, 0);">User Name : <br></label>
     <input class="input" type="text" name="username" >
    </div>
    <div style="margin-top: 1.5%;">
        <label style="font-size: 150%; color: rgb(0, 0, 0);">Password : <br></label>
        <input class="input" type="password" name="password">
    </div>
    <div style="margin-top: 1.5%;">
         <button id="bttn" type="submit" style="color: rgb(253, 249, 249); width: 13%; padding: .7%; background-color: rgb(255, 94, 0);">LogIn</button>
         <p style="font-size: smaller;">By clicking on Login, I accept the Terms & Conditions & Privacy Policy</p>
    </div>
    </main>
</body>
<script src="Loginpage.js"></script>
<script src="Signuppage.js"></script>
</html>
