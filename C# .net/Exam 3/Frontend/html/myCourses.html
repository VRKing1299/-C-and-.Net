<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>My Courses</title>
        <link rel="stylesheet" href="../Css/CourseCard.css" />

        <style>
            body {
                font-family: "Segoe UI", sans-serif;
                background: #f9f7ff;
                margin: 0;
            }

            /* ===== HEADER ===== */
            .header {
                background: linear-gradient(135deg, #5a0ffa, #9d65fe);
                color: white;
                text-align: center;
                padding: 40px 20px;
            }

            .header h1 {
                margin-bottom: 8px;
            }

            .header p {
                opacity: 0.9;
            }

            /* ===== CONTAINER ===== */
            .container {
                padding: 30px;
            }

            /* ===== EMPTY STATE ===== */
            .empty {
                text-align: center;
                margin-top: 60px;
                color: #777;
                font-size: 18px;
            }

            /* ===== START BUTTON STYLE ===== */
            .start-btn {
                background: linear-gradient(135deg, #5a0ffa, #9d65fe);
                color: white;
                border: none;
                padding: 8px 16px;
                border-radius: 6px;
                cursor: pointer;
                font-size: 13px;
            }

            .start-btn:hover {
                background: linear-gradient(135deg, #9d65fe, #5a0ffa);
            }
        </style>
    </head>

    <body>
        <!-- HEADER -->
        <div class="header">
            <h1>My Courses</h1>
            <p>Your purchased courses — start learning now 🚀</p>
        </div>

        <!-- COURSE GRID -->
        <div class="container">
            <div class="course-grid" id="myCourses"></div>
        </div>

        <script src="../jquery-4.0.0.js"></script>
        <script type="module" src="../dist/MyCourses.js"></script>
        <script type="module" src="../dist/Navigation.js"></script>
    </body>
</html>
